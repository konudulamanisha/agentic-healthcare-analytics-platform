version: "3.9"

services:
  healthcare-api:
    build: .
    container_name: healthcare-analytics-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Run the full pipeline as a one-shot job
  pipeline:
    build: .
    container_name: healthcare-analytics-pipeline
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - PYTHONPATH=/app/src
    command: python src/langgraph_workflow.py --data data/patient_data.csv --output output
    profiles: ["pipeline"]
